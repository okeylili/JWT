services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: secureauth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  server:
    build:
      context: ./server
    env_file:
      - ./server/.env.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/secureauth?schema=public
      REDIS_URL: redis://redis:6379
      CLIENT_URL: http://localhost:5173
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"

  client:
    build:
      context: ./client
    environment:
      VITE_API_URL: http://localhost:4000
    depends_on:
      - server
    ports:
      - "5173:5173"

volumes:
  postgres_data:
